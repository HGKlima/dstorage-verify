<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUK STORAGE 벤더 인증 시스템</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            background-color: transparent;
            color: #37352f;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 450px;
            padding: 18px;
            background: #fbfbfa;
            border: 1px solid #edece9;
            border-radius: 6px;
            box-shadow: rgba(15, 15, 15, 0.05) 0px 1px 2px;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #37352f;
        }
        .desc {
            font-size: 12px;
            color: #787774;
            margin-bottom: 14px;
        }
        .input-group {
            display: flex;
            gap: 6px;
        }
        input {
            flex: 1;
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #edece9;
            border-radius: 4px;
            background: #fff;
            color: #37352f;
            outline: none;
        }
        input:focus {
            border-color: #2383e2;
        }
        button {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            background-color: #111111;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #333333;
        }
        #result {
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.5;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">📦 DUK STORAGE 파트너 입점 검증</div>
    <div class="desc">정상 영업 중인 계속사업자만 물류 시스템 연동 및 인보이스 발행이 가능합니다.</div>
    
    <div class="input-group">
        <input type="text" id="bizNo" placeholder="사업자등록번호 10자리 (- 제외)" maxlength="10">
        <button onclick="checkBusiness()">조회</button>
    </div>
    
    <div id="result"></div>
</div>

<script>
function checkBusiness() {
    const bizNoInput = document.getElementById('bizNo').value.trim();
    const resultDiv = document.getElementById('result');
    
    // 포맷 밸리데이션 검인
    if (bizNoInput.length !== 10 || isNaN(bizNoInput)) {
        resultDiv.innerHTML = "<span style='color: #eb5757;'>❌ 하이픈(-) 없이 숫자 10자리를 입력하십시오.</span>";
        return;
    }
    
    resultDiv.innerHTML = "<span style='color: #787774;'>🔄 국세청 시스템 실시간 조회 중...</span>";
    
    // 공공데이터포털에서 발급받은 실장님의 [Encoding]된 서비스 키 입력
    const SERVICE_KEY = "c4c1853b7b15a86354f7f1ae1602d566df5a60e12cbe8c57e55ef0fed2e7eefc"; 
    const url = `https://api.odcloud.kr/api/nts-businessman/v1/status?serviceKey=${SERVICE_KEY}`;
    
    fetch(url, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
        },
        body: JSON.stringify({ "b_no": [bizNoInput] })
    })
    .then(res => {
        if (!res.ok) throw new Error("Network response error");
        return res.json();
    })
    .then(resData => {
        if (resData && resData.data && resData.data[0]) {
            const statusTarget = resData.data[0];
            const statusCode = statusTarget.b_stts_cd; // 01: 계속사업자, 02: 휴업, 03: 폐업
            const statusText = statusTarget.b_stts || "정상 확인";
            const taxType = statusTarget.tax_type; // 일반과세자, 간이과세자 등
            
            if (statusCode === "01") {
                resultDiv.innerHTML = `<span style='color: #2b7a3e;'>✅ <b>인증 성공</b>: ${statusText}<br><small style='color: #787774;'>(${taxType} / DUK STORAGE 파트너 연결 가능)</small></span>`;
            } else if (statusCode === "02" || statusCode === "03") {
                resultDiv.innerHTML = `<span style='color: #eb5757;'>⚠️ <b>진입 제한</b>: 현재 ${statusText} 상태의 사업자입니다.</span>`;
            } else {
                resultDiv.innerHTML = `<span style='color: #eb5757;'>❌ <b>국세청 미등록</b>: 등록되지 않은 번호이거나 포맷 오류입니다.</span>`;
            }
        } else {
            resultDiv.innerHTML = "<span style='color: #eb5757;'>❌ 데이터 파싱 오류가 발생했습니다.</span>";
        }
    })
    .catch(err => {
        console.error(err);
        resultDiv.innerHTML = "<span style='color: #eb5757;'>❌ 국세청 게이트웨이 통신 실패 (CORS 또는 키 오류)</span>";
    });
}

// 엔터키 핸들러 추가하여 UI 스캔 효율성 확보
document.getElementById('bizNo').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkBusiness();
});
</script>

</body>
</html>
